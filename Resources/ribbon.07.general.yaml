panels:
  # ============================================================
  # GENERAL PANEL
  # ============================================================
  - name: General
    items:
      - type: pulldown
        name: Export Manager
        icon: Print
        tooltip: Drawing Set printing and plotting tools.
        buttons:
          - name: Print PDF / CAD
            command: PrintCommand
            icon: Print
            tooltip: Batch export sheets to PDF or DWG with automatic sorting and Print Set selection.
      - type: stacked
        buttons:
          - type: pulldown
            name: Allow Join
            icon: AllowJoin
            tooltip: Allow geometry joining on selected elements or entire view.
            buttons:
              - name: Allow Join (Selection)
                command: AllowJoinCommand
                icon: AllowJoin
                tooltip: Allow geometry join on selected elements.
              - name: Allow Join (View)
                command: AllowJoinAllCommand
                icon: AllowJoinAll
                tooltip: Allow geometry join on all elements in the active view.
          - type: pulldown
            name: Disallow Join
            icon: DisAllowJoin
            tooltip: Prevent geometry joining on selected elements or entire view.
            buttons:
              - name: Disallow Join (Selection)
                command: DisAllowJoinCommand
                icon: DisAllowJoin
                tooltip: Disallow geometry join on selected elements.
              - name: Disallow Join (View)
                command: DisAllowJoinAllCommand
                icon: DisAllowJoinAll
                tooltip: Disallow geometry join on all elements in the active view.
          - name: Beam Reset
            command: BeamResetCommand
            icon: BeamReset
            tooltip: Reset beam start/end extensions and justification to defaults.
      - type: stacked
        buttons:
          - name: Join Advance
            command: JoinAdvanceCommand
            icon: JoinAdvance
            tooltip: Toggle join/unjoin geometry between two selected elements.
          - name: Cut Geometry
            command: CutGeometryCommand
            icon: CutGeo
            tooltip: Use one element to cut all intersecting elements in its path.
          - name: Flip Elements
            command: FlipElementsCommand
            icon: Flip
            tooltip: Flip the facing or orientation of selected elements.
      - type: stacked
        buttons:
          - type: pulldown
            name: Revision
            icon: Revision
            tooltip: Revision management tools.
            buttons:
              - name: Set Rev
                command: SetRevisionCommand
                icon: SetRev
                tooltip: Set selected revisions on selected sheets.
              - name: Create Rev Set
                command: CreateRevSetCommand
                icon: CreateRev
                tooltip: Create a sheet set from sheets containing selected revisions.
          - type: pulldown
            name: View Filters
            icon: ViewFilters
            tooltip: Copy view filters or create a filter legend.
            buttons:
              - name: Copy Filters
                command: ViewFiltersCopyCommand
                icon: ViewFiltersCopy
                tooltip: Copy view filters from one view to selected views.
              - name: Filters Legend
                command: ViewFiltersLegendCommand
                icon: ViewFiltersLegend
                tooltip: Generate a legend showing all filter colors and rules.
          - type: pulldown
            name: Toggle Grids
            icon: ToggleGrids
            tooltip: Toggle grid bubble visibility or switch grids between 2D and 3D.
            buttons:
              - name: Toggle All Grids
                command: ToggleAllGridsCommand
                icon: ToggleAllGrids
                tooltip: Show or hide all grid lines in the active view.
              - name: Grid 3D & 2D
                command: Grid3D2DCommand
                icon: Grid3D2D
                tooltip: Switch selected grids between 3D and 2D extents.
      - type: stacked
        buttons:
          - name: Rotate Multiple
            command: ElementsRotateMultipleCommand
            icon: ElementsRotateMultiple
            tooltip: Rotate multiple selected elements by a specified angle.
          - type: pulldown
            name: Filled Regions
            icon: FilledRegions
            tooltip: Tools for merging, converting, or styling filled regions.
            buttons:
              - name: Merge Regions
                command: MergeRegionsCommand
                icon: MergeRegions
                tooltip: Merge multiple overlapping filled regions into one.
              - name: Regions -> Floors
                command: RegionsToFloorsCommand
                icon: RegionsToFloors
                tooltip: Convert filled regions to floor elements.
              - name: Regions -> Ceilings
                command: RegionsToCeilingsCommand
                icon: RegionsToCeilings
                tooltip: Convert filled regions to ceiling elements.
              - name: Change LineStyle
                command: RegionChangeLineStyleCommand
                icon: RegionChangeLineStyle
                tooltip: Change the line style of selected filled region boundaries.
          - type: pulldown
            name: Walls
            icon: Walls
            tooltip: Adjust wall top and base constraints.
            buttons:
              - name: Match Top
                command: WallMatchTopCommand
                icon: WallMatchTop
                tooltip: Match the top constraint of selected walls to a reference wall.
              - name: Match Base
                command: WallMatchBaseCommand
                icon: WallMatchBase
                tooltip: Match the base constraint of selected walls to a reference wall.
              - name: Match Both
                command: WallMatchBothCommand
                icon: WallMatchBoth
                tooltip: Match both top and base constraints to a reference wall.
              - name: Modify Constraints
                command: ModifyWallConstraintsCommand
                icon: ModifyWallConstraints
                tooltip: Manually set the top and base constraints for selected walls.
      - type: stacked
        buttons:
          - type: pulldown
            name: Auto Dims
            icon: AutoDims
            tooltip: Dimensioning tools.
            buttons:
              - name: Auto Dims
                command: AutoDimensionCommand
                icon: AutoDims
                tooltip: Auto-dimension grids, walls, columns, and foundations in the current plan view.
              - name: Dim Audit
                command: DimAuditCommand
                icon: DimAudit
                tooltip: Find and fix overlapping or unreadable dimensions in the active view.
