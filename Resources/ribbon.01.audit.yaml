tab:
  name: antiGGGravity

panels:
  # ============================================================
  # PROJECT AUDIT PANEL
  # ============================================================
  - name: Project Audit
    items:
      - type: pushbutton
        name: Project Folder
        command: OpenProjectFolderCommand
        icon: ProjectFolder
        tooltip: Open the folder containing the central model.
      - type: pulldown
        name: Audit
        icon: ProjectAudit
        tooltip: Project audit and cleanup tools.
        buttons:
          - name: Wipe Empty Tags
            command: WipeEmptyTagsCommand
            icon: WipeEmptyTags
            tooltip: Delete all tags that have no content in the current view.
          - name: Resolve Overlaps
            command: OverlapResolverCommand
            icon: ResolveOverlaps
            tooltip: Detect and fix overlapping text notes and tags.
          - name: Project TextStyle
            command: ProjectTextStyleCommand
            icon: ProjectTextStyle
            tooltip: Batch align text notes and their leaders, or convert between styles.
          - separator: true
          - name: Title on Sheets
            command: TitleOnSheetsCommand
            icon: TitleOnSheets
            tooltip: Apply a consistent title block across all sheets (eg Section, Detail).
      - type: stacked
        buttons:
          - name: Load More Type
            command: LoadMoreTypeCommand
            icon: LoadMoreType
            tooltip: Load additional types from an existing family.
